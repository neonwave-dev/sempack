# Draft-gated CI. Draft PRs are skipped; marking a PR "Ready for review"
# (what the ship-ready skill does) triggers this run, which watch-ci then polls.
# Job names match the org ruleset check contexts: "Rust" and "TypeScript".
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all --all-features

      - name: Build
        run: cargo build --all --all-features

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        if: hashFiles('pnpm-lock.yaml') != ''
        run: corepack enable

      - name: Setup Node
        if: hashFiles('pnpm-lock.yaml') != ''
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm typecheck

      - name: Lint
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm lint:ts

      - name: Build
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm build
